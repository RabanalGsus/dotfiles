# Use GLX backend for speed
backend = "glx"
vsync = true

# --- Rounded Corners ---
corner-radius = 12;

# This prevents the rounded corners from looking "pixelated" 
# or having weird edges on certain windows
detect-rounded-corners = true;

# Exclude Polybar and other docks so they stay flush against the screen
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# --- Shadows and fading ---
shadow = true
shadow-radius = 12
shadow-opacity = 0.4
# Exclude shadows from rounded corners to prevent "double shadow" artifacts
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];

fading = true
fade-in-step = 0.03
fade-out-step = 0.03

# --- Window opacity ---
inactive-opacity = 0.95
active-opacity = 1.0

# --- Blur (The "Frosted Glass" Upgrade) ---
# dual_kawase is much higher quality than 'kernel'
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 7;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'slop'",       # This is the selection tool for maim!
  "_GTK_FRAME_EXTENTS@:c"
];
