[colors]
background = #282e3a
background-alt = #d1c4e99
foreground = #e5e9f0
foreground-alt = #282e3a
primary = #ffb52a
secondary = #e60053
alert = #B48EAD

cyan = #88C0D0
aqua = #8FBCBB
red = #BF616A
yellow = #EBCB8B
green = #A3BE8C
orange = #D08770
magenta = #BF616A
white = #D8DEE9
pink = #C394B4
blue = #81a1c1
black = #3B4252

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/main]
width = 100%
height = 20
radius = 0.0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 0
padding-right = 0

border-size = 8
border-color = ${colors.background} 

module-margin-left = 0
module-margin-right = 0

font-0 = "Inconsolata CondensedBlack:size=13;3"
font-1 = "SauceCodePro Nerd Font Mono:size=22;6"
font-2 = "Material Icons:pixelsize=12;3"
font-3 = "Sinji:pixelsize=15;5"
font-4 = "Togalite medium:pixelsize=11;2"
font-5 = "Simple Icons:size=12;3"

; MODULES SETUP
modules-left = launcher xworkspaces
modules-center = windowtitle sep
modules-right = right1 filesystem cpu memory mic volume power-profile battery backlight networks-unified date right2 shutdown

tray-position = none
tray-padding = 5
;tray-background = #0063ff

cursor-click = pointer
cursor-scroll = pointer

line-size = 2

enable-ipc = true

;separator = %{F#4C566A}|%{F-}


[module/left1]
type = custom/text
content-foreground = ${colors.black}
content = " Óā∂"

[module/left2]
type = custom/text
content-foreground = ${colors.black}
content = "Óāī"

[module/medium1]
type = custom/text
content-foreground = ${colors.black}
content = " Óā∂"

[module/medium2]
type = custom/text
content-foreground = ${colors.black}
content = "Óāī"

[module/right1]
type = custom/text
content-foreground = ${colors.black}
content = " Óā∂"

[module/right2]
type = custom/text
content-foreground = ${colors.black}
content = "Óāī"

[module/sep]
type = custom/text
content = " "

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/xworkspaces]
type = internal/xworkspaces

; The one you are currently using
label-active = %name%
label-active-foreground = ${colors.yellow}
label-active-background = ${colors.background-alt}
label-active-padding = 3

; Any workspace that has a window open (but isn't active)
label-occupied = %name%
label-occupied-foreground = ${colors.cyan}
label-occupied-padding = 3

; Any workspace with NO windows (we can keep this cyan too, or dimmer if you prefer)
label-empty = %name%
label-empty-foreground = ${colors.cyan}
label-empty-padding = 3

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 3

; Add this to fix the "1 2 4 3" order issue from your screenshot
index-sort = true

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/launcher]
type = custom/script
exec = echo ÔĆú
interval = 100
label = " %output% "
format-foreground = ${colors.blue}

; Change this to whatever you use to open your apps
click-left = kitty -e btop

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/kernel-name]
type = custom/script
exec = uname -r
interval = 10000
label = "  Ô†ľ  %output% "
format-foreground = ${colors.white}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/filesystem]
type = internal/fs


; Mountpoints to display
mount-0 = /

; Seconds to sleep between updates
; Default: 30
interval = 10

; Display fixed precision values
; Default: false
fixed-values = true

; Spacing between entries
; Default: 2
spacing = 4

; Available tags:
;   <label-mounted> (default)
;   <bar-free>
;   <bar-used>
;   <ramp-capacity>
format-mounted = %{A1:nautilus &:}<label-mounted>%{A}

; Available tags:
;   <label-unmounted> (default)
format-unmounted = <label-unmounted>

; Available tokens:
;   %mountpoint%
;   %type%
;   %fsname%
;   %percentage_free%
;   %percentage_used%
;   %total%
;   %free%
;   %used%
; Default: %mountpoint% %percentage_free%%
label-mounted = "  Óóĺ %percentage_used%% "

; Available tokens:
;   %mountpoint%
; Default: %mountpoint% is not mounted
label-unmounted = %mountpoint%: not mounted
label-unmounted-foreground = #55
label-unmounted-background = ${colors.black}
label-mounted-background = ${colors.black}

label-mounted-foreground = ${colors.blue}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/windowtitle]
type = custom/script
exec = ~/.config/polybar/scripts/window-icon.sh
interval = 1

; Use the pill styling we perfected earlier
format = <label>
format-prefix = "Óā∂"
format-prefix-foreground = ${colors.black}
format-suffix = "Óāī"
format-suffix-foreground = ${colors.black}

label = %output%
label-maxlen = 40
label-background = ${colors.black}
label-foreground = ${colors.cyan}
label-padding = 0

; Important: If the script returns nothing, don't show the pill
format-empty =

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/volume]
type = custom/script
exec = ~/.config/polybar/scripts/volume.sh
interval = 1
format-background = ${colors.black}
format-padding = 0

# Maintain the scroll logic
scroll-up = pamixer -i 5
scroll-down = pamixer -d 5
click-left = pamixer -t

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/mic]
type = custom/script
exec = ~/.config/polybar/scripts/mic.sh
interval = 1

# Match your clean styling
format-background = ${colors.black}
format-padding = 1

# Allow clicking the icon on the bar to toggle the mic too!
click-left = pamixer --default-source -t

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery_status.sh
interval = 0.8

format-background = ${colors.black}
format-padding = 1

; Keep your power profile click functionality
click-left = ~/.config/polybar/scripts/power_profile.sh

[module/power-profile]
type = custom/script
exec = ~/.config/polybar/scripts/power_status.sh
interval = 2

; Click to change profiles
click-left = ~/.config/polybar/scripts/power_profile.sh

format-background = ${colors.black}
format-padding = 0
label = %output%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/backlight]
type = internal/backlight

# This is the specific driver for your AMD GPU
card = amdgpu_bl1

use-actual-brightness = true
enable-scroll = true

# The "Fucking Clean" styling
format = <ramp> <label>
format-background = ${colors.black}
format-padding = 1

label = %percentage%%
label-foreground = ${colors.aqua}

# Sun icons for brightness levels
ramp-0 = " ůįÉě"
ramp-1 = " ůįÉü"
ramp-2 = " ůįÉ†"
ramp-foreground = ${colors.aqua}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/networks-unified]
type = custom/script
exec = ~/.config/polybar/scripts/networks-unified.sh
interval = 3

format = <label>
format-background = ${colors.black}
format-foreground = ${colors.yellow}
format-padding = 1

; This keeps the network name in that lighter yellow color you liked
label = %{F#f0c674}%output%%{F-}

; Still triggers your Rofi wifi menu
click-left = ~/.config/polybar/scripts/rofi-wifi-menu.sh

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/memory]
type = internal/memory
; Seconds to sleep between updates
interval = 3

label = "  ÓČ¶ %percentage_used%%"

format-prefix-padding = 2
format-prefix-font = 2
format-prefix-foreground = #ffffff
format-background = ${colors.black}
format-foreground = ${colors.pink}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/cpu]
type = internal/cpu

interval = 1
format = <label>
label = "  Ôčõ %percentage%% "

format-background = ${colors.black}
format-foreground = ${colors.yellow}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/date]
type = internal/date
interval = 1

date = 
date-alt = "  Ô®ü  %A, %b %d -"

time = "  ÓéÖ  %H:%M "
time-alt = "%H:%M:%S "

;format-prefix = "ÓéÖ"
format-prefix-padding = 1
format-prefix-font = 1
format-prefix-foreground = #ffffff
format-background = ${colors.black}
format-foreground = ${colors.white}

label = %date% %time%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/shutdown]
type = custom/text
content = " ÔÄĎ"
;content-background = ${colors.black}
content-foreground = ${colors.red}
content-padding = 1
click-left = $HOME/.config/polybar/scripts/rofi-poweroff.sh
click-right = $HOME/.config/polybar/scripts/rofi-poweroff.sh 

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[global/wm]
;margin-top = 5
;margin-bottom = 5

; vim:ft=dosini
