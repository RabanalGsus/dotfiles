[colors]
background = #282e3a
background-alt = #d1c4e99
foreground = #e5e9f0
foreground-alt = #282e3a
primary = #ffb52a
secondary = #e60053
alert = #B48EAD

cyan = #88C0D0
aqua = #8FBCBB
red = #BF616A
yellow = #EBCB8B
green = #A3BE8C
orange = #D08770
magenta = #BF616A
white = #D8DEE9
pink = #C394B4
blue = #81a1c1
black = #3B4252

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/main]
width = 100%
height = 20
radius = 0.0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 0
padding-right = 0

border-size = 8
border-color = ${colors.background} 

module-margin-left = 0
module-margin-right = 0

font-0 = "Inconsolata CondensedBlack:size=13;3"
font-1 = "SauceCodePro Nerd Font Mono:size=22;6"
font-2 = "Material Icons:pixelsize=12;3"
font-3 = "Sinji:pixelsize=15;5"
font-4 = "Togalite medium:pixelsize=11;2"

; MODULES SETUP
modules-left = launcher xworkspaces
modules-center = medium1 windowtitle medium2 sep
modules-right = right1 filesystem cpu memory volume power-profile battery wifi-menu date right2 shutdown

tray-position = none
tray-padding = 5
;tray-background = #0063ff

cursor-click = pointer
cursor-scroll = pointer

line-size = 2

enable-ipc = true

;separator = %{F#4C566A}|%{F-}


[module/left1]
type = custom/text
content-foreground = ${colors.black}
content = " Óā∂"

[module/left2]
type = custom/text
content-foreground = ${colors.black}
content = "Óāī"

[module/medium1]
type = custom/text
content-foreground = ${colors.black}
content = " Óā∂"

[module/medium2]
type = custom/text
content-foreground = ${colors.black}
content = "Óāī"

[module/right1]
type = custom/text
content-foreground = ${colors.black}
content = " Óā∂"

[module/right2]
type = custom/text
content-foreground = ${colors.black}
content = "Óāī"

[module/sep]
type = custom/text
content = " "

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-foreground = ${colors.blue}
label-active-background = ${colors.background-alt}
label-active-padding = 3

label-occupied = %name%
label-occupied-foreground = ${colors.cyan}
label-occupied-padding = 3

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 3

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 3

[module/bspwm]
type = internal/bspwm
;ws-icon-0 = TERM;%{F#A3BE8C}Óěē
;ws-icon-1 = WEB;%{F#D08770}ÔČ©
;ws-icon-2 = CODE;%{F#81A1C1}Ô¨Ź
;ws-icon-3 = MISC;%{F#EBCB8B}Óěô
;ws-icon-4 = EDIT;%{F#B48EAD}Ôü®
;ws-icon-5 = CHAT;%{F#88C0D0}Óąē
;ws-icon-6 = DISCORD;%{F#D08770}Ô≠ģ
;ws-icon-7 = MUSIC;%{F#A3BE8C}ÔÜľ
;ws-icon-default = ‚ôü

label-focused = "%name%"
label-focused-background = ${colors.black}
;label-focused-underline= ${colors.cyan}
label-focused-foreground = #88C0D0
label-focused-padding = 2

label-occupied = %name%
label-occupied-background = ${colors.black}
label-occupied-foreground = #D8DEE9
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.black}
label-urgent-foreground = #BF616A
label-urgent-padding = 2

label-empty = %name% 
label-empty-background = ${colors.black}
label-empty-foreground = #2E3440
label-empty-padding = 2


; Separator in between workspaces
label-separator = 

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/launcher]
type = custom/script
exec = echo ÔĆú
;exec = echo Ô†ľ
interval = 100
label = "  %output%  "

;format-background = ${colors.white}
format-foreground = ${colors.blue}

click-left = $HOME/.config/bspwm/rofi/bin/launcher


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/kernel-name]
type = custom/script
exec = uname -r
interval = 10000
label = "  Ô†ľ  %output% "
format-foreground = ${colors.white}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/filesystem]
type = internal/fs


; Mountpoints to display
mount-0 = /

; Seconds to sleep between updates
; Default: 30
interval = 10

; Display fixed precision values
; Default: false
fixed-values = true

; Spacing between entries
; Default: 2
spacing = 4

; Available tags:
;   <label-mounted> (default)
;   <bar-free>
;   <bar-used>
;   <ramp-capacity>
format-mounted = %{A1:nautilus &:}<label-mounted>%{A}

; Available tags:
;   <label-unmounted> (default)
format-unmounted = <label-unmounted>

; Available tokens:
;   %mountpoint%
;   %type%
;   %fsname%
;   %percentage_free%
;   %percentage_used%
;   %total%
;   %free%
;   %used%
; Default: %mountpoint% %percentage_free%%
label-mounted = "  Óóĺ %percentage_used%% "

; Available tokens:
;   %mountpoint%
; Default: %mountpoint% is not mounted
label-unmounted = %mountpoint%: not mounted
label-unmounted-foreground = #55
label-unmounted-background = ${colors.black}
label-mounted-background = ${colors.black}

label-mounted-foreground = ${colors.blue}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/windowtitle]
type = internal/xwindow
format = <label>
format-background = ${colors.black}
format-foreground = ${colors.cyan}
format-padding = 1
label = "Ôčź  %title%"
label-maxlen = 30
label-empty = " ÔĄą "
label-separator = " "
label-empty-foreground = ${colors.cyan}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/volume]
type = internal/pulseaudio

# This works like the battery: it picks the icon based on %
format-volume = <ramp-volume> <label-volume>
format-volume-background = ${colors.black}
format-volume-foreground = ${colors.aqua}
format-volume-padding = 1

# THE "ANIMATION" STEPS
# We use the Mono icons so they occupy the exact same space
ramp-volume-0 = " ÔÄ¶"
ramp-volume-1 = " ÔÄß"
ramp-volume-2 = " ÔÄ®"

# The 'Base' alignment trick:
# This forces the ramp icons to be treated as a fixed-width unit
ramp-volume-font = 2

# Percentage label
label-volume = %percentage%%
label-volume-font = 1

# Muted State
format-muted = <label-muted>
format-muted-background = ${colors.black}
format-muted-foreground = ${colors.red}
label-muted = "  ůįĚü"
label-muted-padding = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery_status.sh
interval = 0.8

format-background = ${colors.black}
format-padding = 1

; Keep your power profile click functionality
click-left = ~/.config/polybar/scripts/power_profile.sh

[module/power-profile]
type = custom/script
exec = ~/.config/polybar/scripts/power_status.sh
interval = 2

; Click to change profiles
click-left = ~/.config/polybar/scripts/power_profile.sh

format-background = ${colors.black}
format-padding = 0
label = %output%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/network]
type = internal/network
interface = wlp2s0
format-connected = <label-connected>
format-connected-prefix = " ÓÜļ"
format-connected-prefix-font = 2
label-connected = " %essid%%downspeed:9% "
label-connected-font = 1

format-disconnected = <label-disconnected>
label-disconnected = Óáö
label-disconnected-font = 2

format-connected-background = ${colors.black}
format-connected-foreground = ${colors.yellow}
format-disconnected-background = ${colors.black}
format-disconnected-foreground = ${colors.yellow}

[module/wifi-menu]
type = custom/script
interface = wlp2s0
# Replace 'wlan0' with your interface name (run 'ip link' to check)
exec = nmcli -t -f active,ssid dev wifi | grep '^yes' | cut -d: -f2
interval = 5


format-prefix = " ÓÜļ"
format-prefix-foreground = ${colors.yellow}
label = %{F#f0c674}%output%%{F-}
format-background = ${colors.black}
format-padding = 1


# This triggers the Rofi script
click-left = ~/.config/polybar/scripts/rofi-wifi-menu.sh

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/memory]
type = internal/memory
; Seconds to sleep between updates
interval = 3

label = "   ÓČ¶ %percentage_used%%"

format-prefix-padding = 2
format-prefix-font = 2
format-prefix-foreground = #ffffff
format-background = ${colors.black}
format-foreground = ${colors.pink}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/wired-network]
type = internal/network
interface = enp2s0
interval = 3.0

udspeed-minwidth = 5

accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-connected = "  ÔõŅ%downspeed%  "
label-connected-foreground = ${colors.background}
label-connected-background = ${colors.green}

label-disconnected = "ÔúĀ  "
label-disconnected-foreground = ${colors.background}
label-disconnected-background = ${colors.white}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/cpu]
type = internal/cpu

interval = 1
format = <label>
label = "  Ôčõ %percentage%% "

format-background = ${colors.black}
format-foreground = ${colors.yellow}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/date]
type = internal/date
interval = 1

date = 
date-alt = "  Ô®ü  %A, %b %d -"

time = "  ÓéÖ  %H:%M "
time-alt = "%H:%M:%S "

;format-prefix = "ÓéÖ"
format-prefix-padding = 1
format-prefix-font = 1
format-prefix-foreground = #ffffff
format-background = ${colors.black}
format-foreground = ${colors.white}

label = %date% %time%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/shutdown]
type = custom/text
content = " ÔÄĎ"
;content-background = ${colors.black}
content-foreground = ${colors.red}
content-padding = 1
click-left = $HOME/.config/polybar/scripts/rofi-poweroff.sh
click-right = $HOME/.config/polybar/scripts/rofi-poweroff.sh 

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[global/wm]
;margin-top = 5
;margin-bottom = 5

